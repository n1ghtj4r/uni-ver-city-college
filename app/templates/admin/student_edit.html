{% extends 'base.html' %}
{% block title %}Edit {{ student.name }} - Uni-VER-city College{% endblock %}
{% block content %}
<div class="mb-6">
    <h2 class="text-2xl font-bold text-blue-800">Edit Student</h2>
    <p class="text-gray-500">Update student information.</p>
</div>

<div class="bg-white rounded-xl shadow p-6 max-w-2xl">
    <form method="POST" action="{{ url_for('admin.edit_student', student_id=student.id) }}" class="space-y-4">
        <div>
            <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Name</label>
            <input type="text" id="name" name="name" value="{{ student.name }}" required
                class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
            <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input type="email" id="email" name="email" value="{{ student.email }}" required
                class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input type="password" id="password" name="password" placeholder="Leave blank to keep current password"
                class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div class="flex gap-3 pt-2">
            <button type="submit"
                class="bg-blue-800 hover:bg-blue-900 text-white font-semibold px-6 py-2 rounded-lg transition">
                Save Changes
            </button>
            <a href="{{ url_for('admin.view_student', student_id=student.id) }}"
                class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold px-6 py-2 rounded-lg transition">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
