{% extends 'base.html' %}
{% block title %}Edit {{ subject.code }} - Uni-VER-city College{% endblock %}
{% block content %}
<div class="mb-6">
    <h2 class="text-2xl font-bold text-blue-800">Edit Subject</h2>
    <p class="text-gray-500">Update subject information.</p>
</div>

<div class="bg-white rounded-xl shadow p-6 max-w-4xl">
    <form method="POST" action="{{ url_for('admin.edit_subject', subject_id=subject.id) }}"
        class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
            <label for="code" class="block text-sm font-medium text-gray-700 mb-1">Subject Code</label>
            <input type="text" id="code" name="code" value="{{ subject.code }}" required
                class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
            <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Subject Name</label>
            <input type="text" id="name" name="name" value="{{ subject.name }}" required
                class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
            <label for="units" class="block text-sm font-medium text-gray-700 mb-1">Units</label>
            <input type="number" id="units" name="units" value="{{ subject.units }}" required
                class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
            <label for="schedule" class="block text-sm font-medium text-gray-700 mb-1">Schedule</label>
            <input type="text" id="schedule" name="schedule" value="{{ subject.schedule or '' }}"
                class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
            <label for="slots" class="block text-sm font-medium text-gray-700 mb-1">Slots</label>
            <input type="number" id="slots" name="slots" value="{{ subject.slots }}" required
                class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div class="md:col-span-2 flex gap-3 pt-2">
            <button type="submit"
                class="bg-blue-800 hover:bg-blue-900 text-white font-semibold px-6 py-2 rounded-lg transition">
                Save Changes
            </button>
            <a href="{{ url_for('admin.view_subject', subject_id=subject.id) }}"
                class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold px-6 py-2 rounded-lg transition">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
