{% extends 'base.html' %}
{% block title %}Login - Uni-VER-city College{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center -mt-16">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
        <div class="text-center mb-6">
            <h2 class="text-3xl font-bold text-blue-800">Uni-VER-city College</h2>
            <p class="text-gray-500 mt-1">Student Enrollment System</p>
        </div>
        <h3 class="text-xl font-semibold text-gray-700 mb-4">Login</h3>
        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-600 mb-1">Email</label>
                <input type="email" name="email" required
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-600 mb-1">Password</label>
                <input type="password" name="password" required
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button type="submit"
                class="w-full bg-blue-800 hover:bg-blue-900 text-white font-semibold py-2 rounded-lg transition">
                Login
            </button>
        </form>
        <p class="text-center text-sm text-gray-500 mt-4">
            Don't have an account?
            <a href="{{ url_for('auth.register') }}" class="text-blue-600 hover:underline">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
